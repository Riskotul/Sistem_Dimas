<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tagihan Bulanan Siswa</title>

<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Glassmorphism */
.glass {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
</style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-gray-100 font-sans">

<div class="min-h-screen flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-gradient-to-b from-blue-400 to-blue-600 text-white p-6 hidden md:block">
    <img src="asset/Logo SMK.jpg" class="h-28 mx-auto mb-8 rounded-xl bg-white p-2">

    <p class="text-center font-bold">Dimas</p>
    <p class="text-center text-sm mb-6">Bendahara</p>

    <nav class="space-y-3 text-sm">
      <a href="index_admin.html" class="block hover:bg-white/20 p-3 rounded-lg">📊 Dashboard</a>
      <a href="Data_Siswa.html" class="block hover:bg-white/20 p-3 rounded-lg">👨‍🎓 Data Siswa</a>
      <a href="Tagihan_Bulanan.html" class="block hover:bg-white/20 p-3 rounded-lg">💳 Tagihan Bulanan</a>
      <a href="Pembayaran_Masuk.html" class="block hover:bg-white/20 p-3 rounded-lg">⬆️ Pembayaran Masuk</a>
      <a href="Laporan_Pengeluaran.html" class="block hover:bg-white/20 p-3 rounded-lg">📉 Laporan Pengeluaran</a>
      <a href="Laporan_Keuangan_Admin.html" class="block bg-white/20 p-3 rounded-lg">📊 Laporan Keuangan</a>
    </nav>
  </aside>


  <!-- Main Content -->
  <main class="flex-1 p-8">

    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-xl font-bold">Dashboard Laporan Keuangan</h2>
      <button class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
    </div>

    <!-- Filter -->
    <div class="bg-white p-4 rounded-xl shadow mb-6 flex items-center space-x-4">
      <div>
        <label class="text-sm text-gray-600">Tahun</label>
        <select id="filterTahun" class="block mt-1 border rounded-md px-3 py-2">
          <option value="all" selected>Semua</option>
          <option value="2024">2024</option>
          <option value="2025">2025</option>
          <option value="2026">2026</option>
        </select>
      </div>

      <div>
        <label class="text-sm text-gray-600">Bulan</label>
        <select id="filterBulan" class="block mt-1 border rounded-md px-3 py-2">
          <option value="all" selected>Semua</option>
          <option value="1">Januari</option>
          <option value="2">Februari</option>
          <option value="3">Maret</option>
          <option value="4">April</option>
          <option value="5">Mei</option>
          <option value="6">Juni</option>
          <option value="7">Juli</option>
          <option value="8">Agustus</option>
          <option value="9">September</option>
          <option value="10">Oktober</option>
          <option value="11">November</option>
          <option value="12">Desember</option>
        </select>
      </div>

      <button type="button" id="btnTampilkanRingkasan" class="mt-5 bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
        Tampilkan
      </button>
    </div>

    <!-- Table -->
    <div class="bg-white p-6 rounded-xl shadow">
      <h2 id="judulRingkasan" class="text-lg font-semibold mb-4 text-gray-700">
        Ringkasan Keuangan
      </h2>

      <div class="overflow-x-auto">
        <table class="min-w-full border border-gray-200">
          <thead class="bg-gray-100">
            <tr>
              <th class="px-4 py-2 border">Tanggal</th>
              <th class="px-4 py-2 border">Deskripsi</th>
              <th class="px-4 py-2 border">Pemasukan</th>
              <th class="px-4 py-2 border">Pengeluaran</th>
            </tr>
          </thead>
          <tbody id="tabelRingkasan">
          </tbody>
        </table>
      </div>

    <!-- Cards -->
    <div class="grid md:grid-cols-3 gap-6 mt-8 mb-6">
      <div class="bg-green-500 text-white p-4 rounded-xl shadow">
        <h4 class="text-sm">Total Pemasukan</h4>
        <p id="totalPemasukan" class="text-xl font-bold">Rp 0</p>
      </div>

      <div class="bg-red-500 text-white p-4 rounded-xl shadow">
        <h4 class="text-sm">Total Pengeluaran</h4>
        <p id="totalPengeluaran" class="text-xl font-bold">Rp 0</p>
      </div>

      <div class="bg-blue-500 text-white p-4 rounded-xl shadow">
        <h4 class="text-sm">Saldo</h4>
        <p id="saldo" class="text-xl font-bold">Rp 0</p>
      </div>
    </div>
    </div>

  </main>
</div>

<script src="backend/js/integration.js" defer></script>
</body>
</html>
