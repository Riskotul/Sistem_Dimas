<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Pembayaran</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 font-sans">

<div class="min-h-screen flex flex-col md:flex-row">

  <!-- Sidebar -->
  <aside class="w-64 bg-gradient-to-b from-blue-400 to-blue-600 text-white p-6 hidden md:block">
    <img src="asset/Logo SMK.jpg" class="h-28 mx-auto mb-8 rounded-xl bg-white p-2">

    <p class="text-center font-bold">Dimas </p>
    <p class="text-center text-sm mb-6">Bendahara</p>

    <nav class="space-y-3 text-sm">
      <a href="index_admin.html" class="block hover:bg-white/20 p-3 rounded-lg">📊 Dashboard</a>
      <a href="Data_Siswa.html" class="block bg-white/20 p-3 rounded-lg">👨‍🎓 Data Siswa</a>
      <a href="Tagihan_Bulanan.html" class="block hover:bg-white/20 p-3 rounded-lg">💳 Tagihan Bulanan</a>
      <a href="Pembayaran_Masuk.html" class="block hover:bg-white/20 p-3 rounded-lg">⬆️ Pembayaran Masuk</a>
      <a href="Laporan_Pengeluaran.html" class="block hover:bg-white/20 p-3 rounded-lg">📉 Laporan Pengeluaran</a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-4 md:p-8">

    <div class="flex justify-between items-center mb-8">
      <h2 class="text-xl font-bold">Data Siswa</h2>
      <button class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto bg-white rounded-xl shadow">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-100 text-gray-700 font-semibold">
          <tr>
            <th class="px-6 py-3 text-left">Nama</th>
            <th class="px-6 py-3 text-left">Kelas</th>
            <th class="px-6 py-3 text-left">NIS</th>
            <th class="px-6 py-3 text-left">Email</th>
            <th class="px-6 py-3"></th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 text-gray-800">
        </tbody>
      </table>
    </div>

  </main>
</div>

<!-- ================= MODAL POPUP ================= -->
<div id="modalEdit" class="fixed inset-0 bg-black/50 hidden justify-center items-center">

  <div class="bg-white rounded-xl w-full max-w-md p-6 relative">

    <h3 class="text-lg font-bold mb-4">Edit Data Siswa</h3>

    <div class="space-y-3">

      <input type="hidden" id="idSiswaEdit" value="">

      <input id="nama" type="text" placeholder="Nama"
        class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-300">

      <input id="kelas" type="text" placeholder="Kelas"
        class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-300">

      <input id="nis" type="text" placeholder="NIS"
        class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-300">

      <input id="email" type="text" placeholder="Email"
        class="w-full border rounded-lg px-3 py-2 focus:ring focus:ring-blue-300">

    </div>

    <div class="flex justify-end mt-6 space-x-2">
      <button onclick="closeModal()" class="px-4 py-2 bg-gray-300 rounded-lg">Batal</button>
      <button onclick="saveData()" class="px-4 py-2 bg-blue-600 text-white rounded-lg">
         Simpan
      </button>
    </div>

  </div>
</div>

<script src="backend/js/integration.js" defer></script>

</body>
</html>
