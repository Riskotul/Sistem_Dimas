<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tagihan Bulanan Siswa</title>

<script src="https://cdn.tailwindcss.com"></script>
<style>
/* Glassmorphism */
.glass {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}
</style>
</head>

<body class="bg-gradient-to-br from-blue-100 to-gray-100 font-sans">

<div class="min-h-screen flex">

<!-- SIDEBAR -->
<aside class="w-64 bg-gradient-to-b from-blue-400 to-blue-600 text-white p-6 hidden md:block">
    <img src="asset/Logo SMK.jpg" class="h-28 mx-auto mb-8 rounded-xl bg-white p-2">

    <p class="text-center font-bold">Dimas</p>
    <p class="text-center text-sm mb-6">Bendahara</p>

    <nav class="space-y-3 text-sm">
      <a href="index_admin.html" class="block hover:bg-white/20 p-3 rounded-lg">📊 Dashboard</a>
      <a href="Data_Siswa.html" class="block hover:bg-white/20 p-3 rounded-lg">👨‍🎓 Data Siswa</a>
      <a href="Tagihan_Bulanan.html" class="block bg-white/20 p-3 rounded-lg">💳 Tagihan Bulanan</a>
      <a href="Pembayaran_Masuk.html" class="block hover:bg-white/20 p-3 rounded-lg">⬆️ Pembayaran Masuk</a>
      <a href="Laporan_Pengeluaran.html" class="block hover:bg-white/20 p-3 rounded-lg">📉 Laporan Pengeluaran</a>
    </nav>
  </aside>

<!-- MAIN CONTENT -->
<main class="flex-1 p-6">

<!-- HEADER -->
<div class="flex justify-between items-center mb-8">

  <h1 class="text-2xl font-bold text-gray-800">Tagihan Bulanan Siswa</h1>

  <!-- Admin -->
  <div class="flex justify-between items-center mb-8 mt-8">
    <button class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
  </div>

</div>

<!-- BUTTON + SEARCH -->
<div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-6">

  <div class="mt-4 flex justify-center">
    <button onclick="openTambahModal()"
    class="px-8 py-3 bg-gradient-to-r from-blue-600 to-green-500 text-white rounded-full shadow-lg hover:scale-105 transition">
      + Tambah Nama Siswa
    </button>
  </div>

  <div class="relative w-full md:w-64">
    <input id="searchInput" onkeyup="cariSiswa()" placeholder="Cari nama siswa..." class="px-4 py-2 rounded-lg border">
  </div>

</div>

<!-- TABLE -->
<div class="glass p-4 mt-8">

  <table class="w-full text-sm text-left">
  <thead class="text-gray-600 border-b">
  <tr>
    <th class="py-3">Nama</th>
    <th>Kelas</th>
    <th>Bulan</th>
    <th>Jumlah Tagihan</th>
    <th>Jatuh Tempo</th>
    <th>Status</th>
    <th>Aksi</th>
  </tr>
  </thead>

  <tbody id="tabelTagihan"></tbody>

  </tbody>
</table>

</div>

<!-- MODAL TAMBAH SISWA -->
<div id="modalTambahSiswa" class="fixed inset-0 bg-black/40 hidden justify-center items-center z-50">

<div class="bg-white w-full max-w-md p-6 rounded-xl shadow-xl">

<h3 class="text-lg font-bold mb-4">Tambah Siswa</h3>

<div class="space-y-3">

<div>
<label class="text-sm">Nama Siswa</label>
<input type="text" id="namaSiswa" class="w-full border px-3 py-2 rounded">
</div>

<div>
<label class="text-sm">Kelas</label>
<input type="text" id="kelasSiswa" class="w-full border px-3 py-2 rounded">
</div>

<div>
<label class="text-sm">Bulan Tagihan</label>
<input type="text" id="bulanTagihan" placeholder="Contoh: Juni 2025" class="w-full border px-3 py-2 rounded">
</div>

<div>
<label class="text-sm">Jumlah Tagihan</label>
<input type="number" id="jumlahTagihan" class="w-full border px-3 py-2 rounded">
</div>

</div>

<div class="flex justify-end gap-3 mt-5">

<button onclick="closeTambahModal()" class="px-4 py-2 bg-gray-300 rounded">
Batal
</button>

<button onclick="simpanSiswa()" class="px-4 py-2 bg-blue-600 text-white rounded">
Simpan
</button>

</div>

</div>
</div>

</main>
</div>

<script>

let dataTagihan = [];

/* ================= LOAD DATA ================= */

function loadData(){

let stored = localStorage.getItem("dataTagihan");

if(stored){

dataTagihan = JSON.parse(stored);

}else{

dataTagihan = []; // mulai dari kosong
saveData();

}

renderTable();

}

function saveData(){
localStorage.setItem("dataTagihan",JSON.stringify(dataTagihan));
}

/* ================= FORMAT RUPIAH ================= */

function formatRupiah(angka){
return "Rp " + angka.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

/* ================= RENDER TABLE ================= */

function renderTable(data = dataTagihan){

let tbody = document.getElementById("tabelTagihan");
tbody.innerHTML="";

data.forEach((item,index)=>{

let statusLabel = item.status==="Lunas"
? `<span class="bg-green-100 text-green-600 px-2 py-1 rounded text-xs">Lunas</span>`
: `<span class="bg-red-100 text-red-600 px-2 py-1 rounded text-xs">Belum Lunas</span>`;

let aksi = item.status==="Lunas"
? `<button onclick="detailTagihan(${index})" class="bg-blue-500 text-white px-3 py-1 rounded text-xs">Detail</button>`
: `
<button onclick="bayarTagihan(${index})" class="bg-green-500 text-white px-3 py-1 rounded text-xs">Bayar</button>
<button onclick="hapusTagihan(${index})" class="bg-red-500 text-white px-3 py-1 rounded text-xs">Hapus</button>
`;

let row = `
<tr class="border-b hover:bg-blue-50">
<td class="py-3">${item.nama}</td>
<td>${item.kelas}</td>
<td>${item.bulan}</td>
<td>${formatRupiah(item.tagihan)}</td>
<td>${item.jatuhTempo}</td>
<td>${statusLabel}</td>
<td class="space-x-2">${aksi}</td>
</tr>
`;

tbody.innerHTML += row;

});

}

/* ================= MODAL TAMBAH ================= */

const modalTambahSiswa = document.getElementById("modalTambahSiswa");

function openTambahModal(){
modalTambahSiswa.classList.remove("hidden");
modalTambahSiswa.classList.add("flex");
}

function closeTambahModal(){
modalTambahSiswa.classList.add("hidden");
modalTambahSiswa.classList.remove("flex");
}

/* ================= SIMPAN SISWA ================= */

function simpanSiswa(){

let nama = document.getElementById("namaSiswa").value;
let kelas = document.getElementById("kelasSiswa").value;
let bulan = document.getElementById("bulanTagihan").value;
let jumlah = document.getElementById("jumlahTagihan").value;

if(!nama || !kelas || !bulan || !jumlah){
alert("Harap isi semua data!");
return;
}

dataTagihan.push({
nama:nama,
kelas:kelas,
bulan:bulan,
tagihan:parseInt(jumlah),
jatuhTempo:"10 " + bulan,
status:"Belum Lunas"
});

saveData();
renderTable();

closeTambahModal();

/* reset input */

document.getElementById("namaSiswa").value="";
document.getElementById("kelasSiswa").value="";
document.getElementById("bulanTagihan").value="";
document.getElementById("jumlahTagihan").value="";

}

/* ================= BAYAR ================= */

function bayarTagihan(index){

dataTagihan[index].status="Lunas";

saveData();
renderTable();

}

/* ================= HAPUS ================= */

function hapusTagihan(index){

if(confirm("Yakin ingin menghapus tagihan?")){

dataTagihan.splice(index,1);

saveData();
renderTable();

}

}

/* ================= DETAIL ================= */

function detailTagihan(index){

let d = dataTagihan[index];

alert(
"Detail Tagihan\n\n"+
"Nama : "+d.nama+
"\nKelas : "+d.kelas+
"\nBulan : "+d.bulan+
"\nJumlah : "+formatRupiah(d.tagihan)+
"\nStatus : "+d.status
);

}

/* ================= CARI SISWA ================= */

function cariSiswa(){

let keyword = document.getElementById("searchInput").value.toLowerCase();

let hasil = dataTagihan.filter(item =>
item.nama.toLowerCase().includes(keyword)
);

renderTable(hasil);

}

/* ================= START ================= */

loadData();

</script>

</body>
</html>
