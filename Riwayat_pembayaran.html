<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard Pembayaran</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

  <div class="min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-64 bg-gradient-to-b from-blue-400 to-blue-600 text-white p-6 hidden md:block">
      <img src="asset/Logo SMK.jpg" class="h-28 mx-auto mb-8 rounded-xl bg-white p-2">

      <p class="text-center font-bold">Nama Siswa</p>
      <p class="text-center text-sm mb-6">Kelas -</p>

      <nav class="space-y-3 text-sm">
        <a href="Index_siswa.html" class="block hover:bg-white/20 p-3 rounded-lg">📊 Dashboard</a>
        <a href="Riwayat_pembayaran.html" class="block bg-white/20 p-3 rounded-lg">📋 Riwayat Pembayaran</a>
        <a href="Tagihan_Spp.html" class="block hover:bg-white/20 p-3 rounded-lg">💳 Tagihan SPP</a>
        <a href="Bantuan_Siswa.html" class="block hover:bg-white/20 p-3 rounded-lg">⚙ Bantuan</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-4 md:p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold">Riwayat Pembayaran</h2>
        <button class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
      </div>

      <!-- Riwayat Pembayaran -->
      <div>
        <div class="overflow-x-auto">
          <table class="min-w-full text-m border border-gray-200 rounded">
            <thead class="bg-gray-100">
              <tr>
                <th class="text-left px-6 py-4">Bulan</th>
                <th class="text-left px-6 py-4">Tanggal Bayar</th>
                <th class="text-left px-6 py-4">Status</th>
                <th class="text-left px-6 py-4">Jumlah</th>
              </tr>
            </thead>
            <tbody id="tbodyRiwayat">
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
<script src="backend/js/integration.js" defer></script>
</body>
</html>
